<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rush Master</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500&family=Manrope:wght@400;500;600;700;800&family=Space+Mono&display=swap');

  :root{
    --rose: #ff2f7e;
    --rose-soft: #ff8fb8;
    --violet: #a83cff;
    --gold: #f0c674;
    --ink: #060108;
    --white: #f9f1ff;
    --dim: #9c84ad;
    --line: rgba(255,255,255,0.08);
  }

  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ height:100%; }

  body{
    background:var(--ink);
    color:var(--white);
    font-family:'Manrope', sans-serif;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:32px 16px;
    overflow-x:hidden;
    position:relative;
    -webkit-font-smoothing:antialiased;
  }

  .bg{ position:fixed; inset:0; z-index:0; pointer-events:none; }
  .bg::before{
    content:""; position:absolute; inset:0;
    background:
      radial-gradient(ellipse 600px 500px at 15% 0%, rgba(255,47,126,0.16), transparent 60%),
      radial-gradient(ellipse 600px 500px at 100% 100%, rgba(168,60,255,0.14), transparent 60%);
  }
  .vignette{
    position:fixed; inset:0; z-index:2; pointer-events:none;
    box-shadow:inset 0 0 220px rgba(0,0,0,0.7);
  }

  /* ===== LOADER ===== */
  #loader{
    position:fixed; inset:0; z-index:999;
    background:var(--ink);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:26px;
    transition:opacity 0.7s ease, visibility 0.7s ease;
  }
  #loader.hide{ opacity:0; visibility:hidden; }
  .mono{
    width:46px; height:46px;
    border:1px solid rgba(255,255,255,0.12);
    border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-family:'Cormorant Garamond', serif;
    font-weight:600; font-size:18px;
    color:var(--rose-soft);
    position:relative;
  }
  .mono::before{
    content:""; position:absolute; inset:-8px; border-radius:50%;
    border:1px solid transparent;
    border-top-color:var(--rose); border-right-color:var(--violet);
    animation:ringspin 1.3s linear infinite;
  }
  @keyframes ringspin{ to{ transform:rotate(360deg); } }
  .loader-label{
    font-family:'Space Mono', monospace; font-size:10px; letter-spacing:4px;
    color:var(--dim); text-transform:uppercase;
  }
  .loader-track{ width:120px; height:1px; background:rgba(255,255,255,0.08); overflow:hidden; }
  .loader-track i{
    display:block; height:100%; width:0%;
    background:linear-gradient(90deg, var(--rose), var(--gold));
    animation:fillbar 1.5s cubic-bezier(.4,0,.2,1) forwards;
  }
  @keyframes fillbar{ to{ width:100%; } }

  /* ===== CARD ===== */
  .card{
    position:relative; z-index:3;
    width:100%; max-width:400px;
    opacity:0; transform:translateY(16px);
  }
  .card.in{ animation:rise 0.9s cubic-bezier(.16,1,.3,1) forwards; }
  @keyframes rise{ to{ opacity:1; transform:translateY(0); } }

  .panel{
    background:linear-gradient(180deg, rgba(255,255,255,0.035), rgba(255,255,255,0.012));
    border:1px solid var(--line);
    border-radius:24px;
    padding:42px 28px 28px;
    backdrop-filter:blur(20px);
    position:relative;
    box-shadow:0 1px 0 rgba(255,255,255,0.06) inset, 0 40px 90px -30px rgba(0,0,0,0.8);
  }
  .panel::after{
    content:""; position:absolute; inset:0; border-radius:24px; padding:1px;
    background:linear-gradient(160deg, rgba(255,47,126,0.5), transparent 25%, transparent 75%, rgba(168,60,255,0.45));
    -webkit-mask:linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
    -webkit-mask-composite:xor; mask-composite:exclude;
    pointer-events:none;
  }

  .crest-row{ display:flex; align-items:center; justify-content:center; gap:10px; margin-bottom:30px; }
  .crest-line{ flex:1; max-width:46px; height:1px; background:linear-gradient(90deg, transparent, rgba(255,47,126,0.35)); }
  .crest-line.r{ background:linear-gradient(90deg, rgba(255,47,126,0.35), transparent); }
  .crest-label{
    font-family:'Space Mono', monospace; font-size:9px; letter-spacing:3.5px;
    color:var(--dim); text-transform:uppercase; white-space:nowrap;
  }

  .avatar-stage{ width:126px; height:126px; margin:0 auto 24px; position:relative; }
  .avatar-ring{
    position:absolute; inset:-6px; border-radius:50%;
    background:conic-gradient(from 220deg, var(--rose), var(--gold) 35%, var(--violet) 70%, var(--rose));
    -webkit-mask:radial-gradient(farthest-side, transparent calc(100% - 2px), #000 calc(100% - 1.5px));
    mask:radial-gradient(farthest-side, transparent calc(100% - 2px), #000 calc(100% - 1.5px));
    animation:slowspin 14s linear infinite;
  }
  @keyframes slowspin{ to{ transform:rotate(360deg); } }
  .avatar-stage img{
    width:100%; height:100%; border-radius:50%; object-fit:cover; display:block;
    box-shadow:0 0 0 4px var(--ink), 0 18px 40px -10px rgba(255,47,126,0.4);
  }
  .badge{
    position:absolute; bottom:2px; right:2px; width:28px; height:28px; border-radius:50%;
    background:linear-gradient(135deg, var(--rose), var(--violet));
    border:3px solid var(--ink);
    display:flex; align-items:center; justify-content:center; font-size:13px;
    box-shadow:0 4px 14px rgba(255,47,126,0.5);
  }

  h1{
    font-family:'Cormorant Garamond', serif; font-weight:600; font-style:italic;
    font-size:30px; text-align:center; margin-bottom:8px; color:var(--white);
  }
  h1 b{
    font-style:normal; font-weight:700;
    background:linear-gradient(90deg, var(--rose-soft), var(--gold));
    -webkit-background-clip:text; background-clip:text; color:transparent;
  }
  .role{
    text-align:center; font-weight:600; font-size:10.5px; letter-spacing:3px;
    color:var(--dim); text-transform:uppercase; margin-bottom:6px;
  }
  .loc{
    text-align:center; font-family:'Space Mono', monospace; font-size:11px;
    color:var(--dim); letter-spacing:1px; margin-bottom:34px;
  }
  .loc b{ color:var(--rose-soft); font-weight:400; }

  /* ===== ICON TILES (logo-filled, no exposed contact info) ===== */
  .tiles{
    display:grid;
    grid-template-columns:repeat(3, 1fr);
    gap:18px;
    padding:8px 4px 4px;
  }

  .tile{
    position:relative;
    aspect-ratio:1/1;
    border-radius:20px;
    text-decoration:none;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:10px;
    background:linear-gradient(165deg, rgba(255,255,255,0.05), rgba(255,255,255,0.015));
    border:1px solid var(--c1);
    overflow:hidden;
    transition:transform 0.35s cubic-bezier(.2,.8,.2,1);
  }

  .tile::before{
    content:"";
    position:absolute; inset:0;
    background:radial-gradient(circle at 50% 30%, var(--c1) 0%, transparent 65%);
    opacity:0.16;
    pointer-events:none;
  }

  .tile:hover{ transform:translateY(-4px) scale(1.03); }

  .tile-icon{
    width:46%;
    height:46%;
    display:flex;
    align-items:center;
    justify-content:center;
    color:var(--c1);
    filter:drop-shadow(0 0 10px var(--c1));
    position:relative;
    z-index:1;
  }
  .tile-icon svg{ width:100%; height:100%; }

  .tile-label{
    position:relative; z-index:1;
    font-family:'Space Mono', monospace;
    font-size:9.5px;
    letter-spacing:2.5px;
    text-transform:uppercase;
    color:var(--dim);
  }

  /* tile glow rings */
  .c-whatsapp{ --c1:#25D366; --c2:#0aff9d; }
  .c-instagram{ --c1:#ff2f7e; --c2:#a83cff; }
  .c-github{ --c1:#7e8cff; --c2:#7ee8ff; }

  .tile.c-whatsapp{ box-shadow:0 0 18px 1px rgba(37,211,102,0.55), 0 0 42px 8px rgba(37,211,102,0.25); animation:pulse-green 2.8s ease-in-out infinite; }
  .tile.c-instagram{ box-shadow:0 0 18px 1px rgba(255,47,126,0.55), 0 0 42px 8px rgba(255,47,126,0.25); animation:pulse-pink 2.8s ease-in-out infinite; }
  .tile.c-github{ box-shadow:0 0 18px 1px rgba(126,140,255,0.55), 0 0 42px 8px rgba(126,140,255,0.25); animation:pulse-blue 2.8s ease-in-out infinite; }

  @keyframes pulse-green{
    0%,100%{ box-shadow:0 0 18px 1px rgba(37,211,102,0.55), 0 0 42px 8px rgba(37,211,102,0.25); }
    50%{ box-shadow:0 0 26px 3px rgba(37,211,102,0.85), 0 0 58px 14px rgba(37,211,102,0.4); }
  }
  @keyframes pulse-pink{
    0%,100%{ box-shadow:0 0 18px 1px rgba(255,47,126,0.55), 0 0 42px 8px rgba(255,47,126,0.25); }
    50%{ box-shadow:0 0 26px 3px rgba(255,47,126,0.85), 0 0 58px 14px rgba(255,47,126,0.4); }
  }
  @keyframes pulse-blue{
    0%,100%{ box-shadow:0 0 18px 1px rgba(126,140,255,0.55), 0 0 42px 8px rgba(126,140,255,0.25); }
    50%{ box-shadow:0 0 26px 3px rgba(126,140,255,0.85), 0 0 58px 14px rgba(126,140,255,0.4); }
  }

  /* ===== FOOTER SOCIAL ICONS (circular, glowing, like reference) ===== */
  .social-footer{
    display:flex; align-items:center; justify-content:center;
    gap:16px;
    margin-top:36px;
    padding-top:24px;
    border-top:1px solid rgba(255,255,255,0.06);
  }
  .sf-icon{
    width:46px; height:46px;
    border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    border:1.5px solid var(--ink-c, #2fe7ff);
    color:var(--ink-c, #2fe7ff);
    text-decoration:none;
    transition:all 0.3s ease;
    box-shadow:0 0 0 0 rgba(0,0,0,0);
  }
  .sf-icon:hover{
    background:var(--ink-c, #2fe7ff);
    color:#06010c;
    box-shadow:0 0 18px var(--ink-c, #2fe7ff), 0 0 34px var(--ink-c, #2fe7ff);
    transform:translateY(-3px);
  }
  .sf-icon svg{ width:20px; height:20px; }

  .sf-github{ --ink-c:#9f9fff; }
  .sf-whatsapp{ --ink-c:#25D366; }
  .sf-instagram{ --ink-c:#ff5fa8; }
  .sf-telegram{ --ink-c:#2fc8ff; }

</style>
</head>
