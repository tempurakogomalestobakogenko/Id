<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rush Master</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500&family=Manrope:wght@400;500;600;700;800&family=Poppins:wght@600;700;800&family=Space+Mono&display=swap');

  :root{
    --rose: #ff2f7e;
    --rose-soft: #ff8fb8;
    --violet: #a83cff;
    --gold: #f0c674;
    --ink: #060108;
    --white: #f9f1ff;
    --dim: #9c84ad;
    --line: rgba(255,255,255,0.08);
  }

  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ height:100%; }

  body{
    background:var(--ink);
    color:var(--white);
    font-family:'Manrope', sans-serif;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:32px 16px;
    overflow-x:hidden;
    position:relative;
    -webkit-font-smoothing:antialiased;
  }

  .bg{ position:fixed; inset:0; z-index:0; pointer-events:none; }
  .bg::before{
    content:""; position:absolute; inset:0;
    background:
      radial-gradient(ellipse 600px 500px at 15% 0%, rgba(255,47,126,0.16), transparent 60%),
      radial-gradient(ellipse 600px 500px at 100% 100%, rgba(168,60,255,0.14), transparent 60%);
  }
  .vignette{
    position:fixed; inset:0; z-index:2; pointer-events:none;
    box-shadow:inset 0 0 220px rgba(0,0,0,0.7);
  }

  /* ===== LOADER (system boot style) ===== */
  #loadingScreen{
    position:fixed; inset:0; z-index:999;
    background:var(--ink);
    display:flex; align-items:center; justify-content:center; flex-direction:column;
  }
  #loadingScreen.fade-out{ animation:loadFadeOut 0.6s ease forwards; }
  @keyframes loadFadeOut{ 0%{ opacity:1; transform:scale(1); } 100%{ opacity:0; transform:scale(1.03); pointer-events:none; } }
  .loading-inner{
    display:flex; flex-direction:column; align-items:center; gap:22px;
    padding:0 32px; width:100%; max-width:380px;
  }
  .load-icon-ring{ position:relative; width:120px; height:120px; display:flex; align-items:center; justify-content:center; }
  .load-ring-1{
    position:absolute; width:120px; height:120px; border-radius:50%;
    border:2px solid transparent; border-color:var(--violet) transparent var(--violet) transparent;
    animation:spinIt 1.4s linear infinite;
    box-shadow:0 0 20px rgba(168,60,255,0.4);
  }
  .load-ring-2{
    position:absolute; width:96px; height:96px; border-radius:50%;
    border:2px solid transparent; border-color:transparent var(--gold) transparent var(--gold);
    animation:spinIt 2.1s linear infinite reverse;
    box-shadow:0 0 14px rgba(240,198,116,0.35);
  }
  .load-ring-3{
    position:absolute; width:74px; height:74px; border-radius:50%;
    border:1.5px solid var(--line); border-top-color:var(--rose-soft);
    animation:spinIt 3.2s linear infinite;
  }
  @keyframes spinIt{ to{ transform:rotate(360deg); } }
  .load-avatar-icon{
    width:52px; height:52px; border-radius:50%;
    border:1px solid var(--line);
    box-shadow:0 0 18px rgba(255,47,126,0.4);
    display:flex; align-items:center; justify-content:center;
    animation:iconPulseL 2s ease-in-out infinite;
    position:relative; z-index:1; overflow:hidden;
  }
  @keyframes iconPulseL{ 0%,100%{ box-shadow:0 0 18px rgba(255,47,126,0.4); } 50%{ box-shadow:0 0 6px rgba(168,60,255,0.2); } }
  .loading-logo{
    font-family:'Cormorant Garamond', serif;
    font-size:clamp(1.1rem, 5.5vw, 1.65rem);
    font-weight:700; font-style:italic; letter-spacing:0.05em;
    color:var(--white); text-align:center; line-height:1.2;
    animation:glitchFlicker 4s infinite;
    text-shadow:0 0 20px rgba(255,47,126,0.35);
  }
  .logo-bracket{ color:var(--gold); text-shadow:0 0 12px rgba(240,198,116,0.5); font-style:normal; }
  .logo-sub{
    font-family:'Space Mono', monospace;
    font-size:clamp(0.46rem, 2vw, 0.58rem);
    letter-spacing:.18em; color:var(--dim);
    text-align:center; margin-top:6px;
  }
  @keyframes glitchFlicker{
    0%,96%,100%{ opacity:1; transform:none; }
    97%{ opacity:.6; transform:translateX(2px) skewX(1deg); }
    98%{ opacity:1; transform:translateX(-2px) skewX(-1deg); }
    99%{ opacity:.8; transform:none; }
  }
  .loading-bar-wrap{ width:100%; height:2px; background:var(--line); border-radius:2px; overflow:hidden; }
  .loading-bar{
    height:100%; width:0%;
    background:linear-gradient(90deg, var(--rose), var(--gold), var(--violet));
    border-radius:2px; transition:width 0.12s linear;
    box-shadow:0 0 10px rgba(255,47,126,0.4); position:relative;
  }
  .loading-bar::after{
    content:''; position:absolute; inset:0;
    background:linear-gradient(90deg, transparent 0%, rgba(255,255,255,.4) 50%, transparent 100%);
    animation:barShimmer 1.2s linear infinite;
  }
  @keyframes barShimmer{ 0%{ transform:translateX(-100%); } 100%{ transform:translateX(300%); } }
  .loading-meta{ width:100%; display:flex; align-items:center; justify-content:space-between; }
  .loading-status{
    font-family:'Space Mono', monospace;
    font-size:clamp(0.52rem, 2.2vw, 0.62rem);
    color:var(--dim); letter-spacing:.1em;
    animation:blinkL 1.1s step-end infinite;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  }
  @keyframes blinkL{ 0%,100%{ opacity:1; } 50%{ opacity:0; } }
  .loading-pct{
    font-family:'Space Mono', monospace; font-size:.7rem; color:var(--gold);
    text-shadow:0 0 8px rgba(240,198,116,0.5); flex-shrink:0;
  }
  .boot-lines{
    width:100%; display:flex; flex-direction:column; gap:3px;
    font-family:'Space Mono', monospace; font-size:0.52rem;
    color:var(--dim); letter-spacing:.06em; opacity:.7; min-height:32px;
  }
  .boot-line{ animation:fadeUpBoot .3s ease both; }
  .boot-line.ok{ color:#aaff45; }
  .boot-line.warn{ color:#ffcc00; }
  @keyframes fadeUpBoot{ from{ opacity:0; transform:translateY(4px); } to{ opacity:.7; transform:none; } }

  /* ===== CARD ===== */
  .card{
    position:relative; z-index:3;
    width:100%; max-width:400px;
    opacity:0; transform:translateY(16px);
  }
  .card.in{ animation:rise 0.9s cubic-bezier(.16,1,.3,1) forwards; }
  @keyframes rise{ to{ opacity:1; transform:translateY(0); } }

  .panel{
    background:linear-gradient(180deg, rgba(255,255,255,0.035), rgba(255,255,255,0.012));
    border:1px solid var(--line);
    border-radius:24px;
    padding:42px 28px 28px;
    backdrop-filter:blur(20px);
    position:relative;
    box-shadow:0 1px 0 rgba(255,255,255,0.06) inset, 0 40px 90px -30px rgba(0,0,0,0.8);
  }
  .panel::after{
    content:""; position:absolute; inset:0; border-radius:24px; padding:1px;
    background:linear-gradient(160deg, rgba(255,47,126,0.5), transparent 25%, transparent 75%, rgba(168,60,255,0.45));
    -webkit-mask:linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
    -webkit-mask-composite:xor; mask-composite:exclude;
    pointer-events:none;
  }

  .crest-row{ display:flex; align-items:center; justify-content:center; gap:10px; margin-bottom:30px; }
  .crest-line{ flex:1; max-width:46px; height:1px; background:linear-gradient(90deg, transparent, rgba(255,47,126,0.35)); }
  .crest-line.r{ background:linear-gradient(90deg, rgba(255,47,126,0.35), transparent); }
  .crest-label{
    font-family:'Space Mono', monospace; font-size:9px; letter-spacing:3.5px;
    color:var(--dim); text-transform:uppercase; white-space:nowrap;
  }

  .avatar-stage{ width:126px; height:126px; margin:0 auto 24px; position:relative; }
  .avatar-ring{
    position:absolute; inset:-6px; border-radius:50%;
    background:conic-gradient(from 220deg, var(--rose), var(--gold) 35%, var(--violet) 70%, var(--rose));
    -webkit-mask:radial-gradient(farthest-side, transparent calc(100% - 2px), #000 calc(100% - 1.5px));
    mask:radial-gradient(farthest-side, transparent calc(100% - 2px), #000 calc(100% - 1.5px));
    animation:slowspin 14s linear infinite;
  }
  @keyframes slowspin{ to{ transform:rotate(360deg); } }
  .avatar-stage img{
    width:100%; height:100%; border-radius:50%; object-fit:cover; display:block;
    box-shadow:0 0 0 4px var(--ink), 0 18px 40px -10px rgba(255,47,126,0.4);
  }
  .badge{
    position:absolute; bottom:2px; right:2px; width:28px; height:28px; border-radius:50%;
    background:linear-gradient(135deg, var(--rose), var(--violet));
    border:3px solid var(--ink);
    display:flex; align-items:center; justify-content:center; font-size:13px;
    box-shadow:0 4px 14px rgba(255,47,126,0.5);
  }

  h1{
    font-family:'Cormorant Garamond', serif; font-weight:600; font-style:italic;
    font-size:30px; text-align:center; margin-bottom:8px; color:var(--white);
  }
  h1 b{
    font-style:normal; font-weight:700;
    background:linear-gradient(90deg, var(--rose-soft), var(--gold));
    -webkit-background-clip:text; background-clip:text; color:transparent;
  }

  .rgb-name{
    font-family:'Poppins', 'Inter', sans-serif;
    font-style:normal;
    font-weight:800;
    font-size:30px;
    letter-spacing:0.5px;
    text-align:center;
    margin-bottom:8px;
  }
  .rgb-name span{
    display:inline-block;
    animation:rgb-cycle 4.5s linear infinite;
    animation-delay:calc(var(--i) * 0.12s);
    filter:drop-shadow(0 0 6px currentColor);
  }
  @keyframes rgb-cycle{
    0%   { color:#ff2f7e; }
    16%  { color:#ff8a3d; }
    33%  { color:#ffd23d; }
    50%  { color:#3dffb0; }
    66%  { color:#3dc7ff; }
    83%  { color:#a83cff; }
    100% { color:#ff2f7e; }
  }
  .role{
    text-align:center; font-weight:600; font-size:10.5px; letter-spacing:3px;
    color:var(--dim); text-transform:uppercase; margin-bottom:6px;
  }
  .loc{
    text-align:center; font-family:'Space Mono', monospace; font-size:11px;
    color:var(--dim); letter-spacing:1px; margin-bottom:34px;
  }
  .loc b{ color:var(--rose-soft); font-weight:400; }

  /* ===== CONTACT ROWS (each box glows its own color) ===== */
  .rows{
    display:flex;
    flex-direction:column;
    gap:14px;
    padding:6px 2px 2px;
  }

  .row{
    position:relative;
    display:flex;
    align-items:center;
    gap:14px;
    padding:14px 16px;
    border-radius:18px;
    text-decoration:none;
    background:linear-gradient(165deg, rgba(255,255,255,0.045), rgba(255,255,255,0.012));
    border:1px solid rgba(255,255,255,0.07);
    transition:transform 0.3s cubic-bezier(.2,.8,.2,1), box-shadow 0.3s ease;
  }
  .row:active{ transform:scale(0.98); }

  .row-icon{
    flex:none;
    width:42px; height:42px;
    border-radius:13px;
    display:flex; align-items:center; justify-content:center;
    background:rgba(255,255,255,0.04);
  }
  .row-icon svg{ width:22px; height:22px; }

  .row-body{ flex:1; min-width:0; }
  .row-name{
    font-family:'Inter', sans-serif; font-weight:700; font-size:15px;
    color:var(--white); margin-bottom:2px;
  }
  .row-sub{
    font-family:'Space Mono', monospace; font-size:11.5px;
    letter-spacing:0.5px; color:var(--dim);
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }

  .row-arrow{
    flex:none;
    width:34px; height:34px;
    border-radius:50%;
    background:rgba(255,255,255,0.05);
    display:flex; align-items:center; justify-content:center;
    color:var(--dim);
  }
  .row-arrow svg{ width:15px; height:15px; }

  /* per-platform colors + glow */
  .row-whatsapp{ --rc:37,211,102; }
  .row-instagram{ --rc:255,47,126; }
  .row-github{ --rc:126,140,255; }

  .row-whatsapp .row-icon{ color:#25D366; }
  .row-instagram .row-icon{ color:#ff2f7e; }
  .row-github .row-icon{ color:#9aa6ff; }

  .row{
    box-shadow:0 0 0 1px rgba(var(--rc),0.18), 0 0 16px 0 rgba(var(--rc),0.18);
    animation:row-glow 3s ease-in-out infinite;
  }
  @keyframes row-glow{
    0%,100%{ box-shadow:0 0 0 1px rgba(var(--rc),0.18), 0 0 14px 0 rgba(var(--rc),0.18); }
    50%{ box-shadow:0 0 0 1px rgba(var(--rc),0.4), 0 0 26px 2px rgba(var(--rc),0.4); }
  }

  .status-line{
    display:flex; align-items:center; justify-content:center; gap:8px;
    margin-top:26px; padding-top:18px;
    border-top:1px solid rgba(255,255,255,0.06);
    font-family:'Space Mono', monospace; font-size:9.5px;
    letter-spacing:2.5px; text-transform:uppercase; color:var(--dim);
  }
  .status-dot{
    width:7px; height:7px; border-radius:50%;
    background:var(--rose); box-shadow:0 0 8px var(--rose);
    animation:dotpulse 1.6s ease-in-out infinite;
  }
  @keyframes dotpulse{ 0%,100%{ opacity:1; } 50%{ opacity:0.35; } }

</style>

<script>
const LOAD_MSGS = [
  'INITIALIZING SYSTEM...',
  'VERIFYING PROFILE...',
  'CONNECTING TO SERVER...',
  'BUILDING  CARD...',
  'PREPARING UI...',
  'PROFILE READY.',
];
const BOOT_LOGS = [
  { t:18, cls:'ok',   txt:'[OK]  crypto layer → loaded' },
  { t:33, cls:'ok',   txt:'[OK]  identity vault → ready' },
  { t:50, cls:'ok',   txt:'[OK]  profile engine → linked' },
  { t:65, cls:'warn', txt:'[!!]  session store → ephemeral' },
  { t:82, cls:'ok',   txt:'[OK]  media handler → active' },
  { t:93, cls:'ok',   txt:'[OK]  shield → ENGAGED' },
];
(function runLoading(){
  const bar=document.getElementById('loadingBar');
  const status=document.getElementById('loadingStatus');
  const pctEl=document.getElementById('loadingPct');
  const bootEl=document.getElementById('bootLines');
  let pct=0,mIdx=0,logged=new Set();
  const iv=setInterval(()=>{
    pct+=Math.random()*13+3;
    if(pct>100)pct=100;
    bar.style.width=pct+'%';
    pctEl.textContent=Math.floor(pct)+'%';
    const nIdx=Math.min(Math.floor((pct/100)*(LOAD_MSGS.length-1)),LOAD_MSGS.length-1);
    if(nIdx!==mIdx){mIdx=nIdx;status.textContent=LOAD_MSGS[mIdx];}
    BOOT_LOGS.forEach(log=>{
      if(pct>=log.t&&!logged.has(log.t)){
        logged.add(log.t);
        const line=document.createElement('div');
        line.className='boot-line '+log.cls;
        line.textContent=log.txt;
        bootEl.appendChild(line);
        while(bootEl.children.length>3)bootEl.removeChild(bootEl.firstChild);
      }
    });
    if(pct>=100){
      clearInterval(iv);
      status.textContent=LOAD_MSGS[LOAD_MSGS.length-1];
      pctEl.textContent='100%';
      setTimeout(()=>{
        const ls=document.getElementById('loadingScreen');
        ls.classList.add('fade-out');
        setTimeout(()=>{
          ls.style.display='none';
          var card = document.getElementById('card');
          if (card) card.classList.add('in');
        },620);
      },500);
    }
  },110);
})();
</script>
